name: Monitoring Pipeline

on:
  schedule:
    - cron: "0 6 * * *"   # tous les jours à 06h UTC
  workflow_dispatch:       # lancement manuel possible

jobs:
  monitoring:
    runs-on: ubuntu-latest

    env:
      AUTO_RETRAIN: "1"
      GITHUB_TOKEN: ${{ secrets.GITHUB_ACCESS_TOKEN }}
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements-cpu.txt
          pip install -r requirements.txt
          pip install -e .

      - name: Sync processed data from S3
        run: |
          echo "── Creating local data directory ──"
          mkdir -p data/processed

          echo "── Sync data from S3 ──"
          aws s3 sync s3://cni-fraud-detection/data/processed/ data/processed/

          echo "── Files downloaded ──"
          ls -lh data/processed/

      - name: Run monitoring pipeline
        run: |
          python -m src.monitoring.run_monitoring_pipeline --skip-generate
