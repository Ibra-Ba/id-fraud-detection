name: CD

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1 : Enregistrement + Promotion MLflow ────────────────────────────
  register-model:
    name: Register & promote model
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    outputs:
      model_version: ${{ steps.register.outputs.model_version }}
      auroc: ${{ steps.register.outputs.auroc }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements-cpu.txt
          pip install -r requirements.txt
          pip install -e .

      - name: Register & promote champion
        id: register
        env:
          MLFLOW_RUN_ID: ${{ secrets.MLFLOW_RUN_ID }}
        run: |
          python - <<'EOF'
          import os
          import mlflow
          from mlflow.tracking import MlflowClient
          from dotenv import load_dotenv

          load_dotenv()
          mlflow.set_tracking_uri(os.getenv("MLFLOW_TRACKING_URI"))
          client = MlflowClient()

          run_id = os.getenv("MLFLOW_RUN_ID")
          model_name = os.getenv("MLFLOW_MODEL_NAME", "IDNet-Fraud-Detector")

          # Enregistrement
          mv = mlflow.register_model(f"runs:/{run_id}/model", model_name)
          version = mv.version
          print(f"Modèle enregistré : v{version}")

          # Tags
          client.set_model_version_tag(model_name, version, "deployed_by", "github_actions")
          client.set_model_version_tag(model_name, version, "deployment_status", "validated")

          # Récupère AUROC du run
          run = client.get_run(run_id)
          auroc = run.data.metrics.get("test_auroc", run.data.metrics.get("vl_auroc", 0.0))

          # Compare avec le champion actuel
          try:
              current = client.get_model_version_by_alias(model_name, "champion")
              current_run = client.get_run(current.run_id)
              current_auroc = current_run.data.metrics.get(
                  "test_auroc", current_run.data.metrics.get("vl_auroc", 0.0)
              )
              print(f"Champion actuel : v{current.version} (AUROC={current_auroc:.4f})")
          except Exception:
              current_auroc = 0.0
              print("Aucun champion existant — promotion automatique")

          if auroc >= current_auroc:
              client.set_registered_model_alias(model_name, "champion", version)
              print(f" v{version} promu @champion (AUROC={auroc:.4f} >= {current_auroc:.4f})")
          else:
              print(f" v{version} non promu (AUROC={auroc:.4f} < {current_auroc:.4f})")

          # Outputs pour les jobs suivants
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"model_version={version}\n")
              f.write(f"auroc={auroc:.4f}\n")
          EOF

  #  Job 2 : Déploiement HF Space
  deploy-hf-space:
    name: Deploy to HF Space
    runs-on: ubuntu-latest
    needs: register-model

    steps:
      - uses: actions/checkout@v4

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          # Clone le Space HF
          git clone https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO} hf_space
          cd hf_space

          # Sync du code API
          cp -r ../src ./src
          cp ../pyproject.toml .

          git add .
          git diff --cached --quiet && echo "Rien à déployer" && exit 0

          git commit -m "cd: deploy v${{ needs.register-model.outputs.model_version }} (AUROC=${{ needs.register-model.outputs.auroc }})"
          git push
          echo "✅ Space HF mis à jour"

  # ─── Job 3 : Notification email ───────────────────────────────────────────
  notify:
    name: Notify deployment
    runs-on: ubuntu-latest
    needs: [register-model, deploy-hf-space]
    if: always()

    steps:
      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: |
            [Id-Fraud-Sentinel] CD ${{ needs.deploy-hf-space.result == 'success' && '✅ succès' || '❌ échec' }} — v${{ needs.register-model.outputs.model_version }}
          to: ${{ secrets.GMAIL_USERNAME }}
          from: ${{ secrets.GMAIL_USERNAME }}
          body: |
            Déploiement GitHub Actions terminé.

            Modèle   : IDNet-Fraud-Detector v${{ needs.register-model.outputs.model_version }}
            AUROC    : ${{ needs.register-model.outputs.auroc }}
            CI       : ${{ needs.deploy-hf-space.result }}
            Commit   : ${{ github.sha }}
            Branche  : ${{ github.ref_name }}

            Space HF : https://huggingface.co/spaces/${{ secrets.HF_SPACE_REPO }}
