exclude: "^(idnet/|\\.venv/|data/raw/|data/processed/|mlruns/)"

repos:
  # ─── Formatage : Black ────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.10.12
        args: ["--line-length", "100"]

  # ─── Linter : Ruff ───────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      - id: ruff
        args: ["--fix", "--line-length", "100"]

  # ─── Vérifications générales ─────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace       # supprime espaces en fin de ligne
      - id: end-of-file-fixer         # assure newline en fin de fichier
      - id: check-yaml                # valide les fichiers YAML
      - id: check-toml                # valide pyproject.toml
      - id: check-json                # valide les JSON
      - id: check-merge-conflict      # bloque si marqueurs de conflit Git
      - id: check-added-large-files   # bloque fichiers > 500KB
        args: ["--maxkb", "500"]
      - id: debug-statements          # bloque les print/breakpoint oubliés
      - id: no-commit-to-branch       # protège main
        args: ["--branch", "main"]

  # ─── Commits conventionnels ──────────────────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat      # nouvelle fonctionnalité
          - fix       # correction de bug
          - chore     # maintenance (deps, config...)
          - docs      # documentation
          - test      # ajout/modif de tests
          - refactor  # refactoring sans changement fonctionnel
          - ci        # modifications CI/CD
          - data      # modifications données/dataset
          - model     # modifications modèle ML
